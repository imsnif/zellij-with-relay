# Shared proxy + WebSocket upgrade directives, included from every location
# that forwards to the relay.

proxy_pass http://relay:8765;

proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        $connection_upgrade;

# WS tunnels now carry a 30s application-layer ping on both endpoints
# (see `zellij-client/src/web_client/relay/multiplexer.rs` +
# `zellij-relay/src/heartbeat.rs`). The proxy timeout stays above the
# 60s application-layer silence budget so nginx doesn't reap tunnels
# that the application-layer watchdog considers healthy.
proxy_read_timeout  120s;
proxy_send_timeout  120s;
proxy_connect_timeout 15s;

# Flow control must propagate — never buffer the WS stream.
proxy_buffering off;
proxy_request_buffering off;
